<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Whot Game</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle, #0f172a, #000);
      color: white;
      text-align: center;
    }

    .container {
      padding-top: 120px;
    }

    h1 {
      font-size: 42px;
      color: gold;
      text-shadow: 0 0 20px gold;
    }

    p {
      opacity: 0.7;
    }

    button {
      display: block;
      margin: 15px auto;
      width: 220px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      font-size: 14px;
    }

    button:hover {
      transform: scale(1.05);
    }

    .login {
      background: gold;
      color: black;
    }

    .register {
      background: #22c55e;
      color: white;
    }

    .wallet {
      background: #3b82f6;
      color: white;
    }

    .footer {
      margin-top: 50px;
      font-size: 12px;
      opacity: 0.5;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🎮 WHOT GAME</h1>
  <p>Stake • Play • Win Real Rewards</p>

  <!-- ✅ FIXED PATHS FOR YOUR STRUCTURE -->
  <button class="login" onclick="location.href='login.html'">
    LOGIN
  </button>

  <button class="register" onclick="location.href='register.html'">
    REGISTER
  </button>

  <button class="wallet" onclick="location.href='./wallet.html'>
    WALLET
  </button>

  <div class="footer">
    PvP Whot Game System • Powered by Appwrite
  </div>

</div>

</body>
</html>
