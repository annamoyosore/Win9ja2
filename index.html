<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Whot Game</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle, #0f172a, #000);
  color: white;
  text-align: center;
}

/* screens */
.screen {
  display: none;
  padding-top: 100px;
}

.active {
  display: block;
}

/* UI */
h1 {
  color: gold;
  font-size: 42px;
}

input {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 220px;
  border-radius: 8px;
  border: none;
}

button {
  width: 220px;
  padding: 12px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

.loginBtn {
  background: gold;
}

.registerBtn {
  background: green;
  color: white;
}

.link {
  background: transparent;
  color: cyan;
}
</style>
</head>

<body>

<!-- ===================== -->
<!-- HOME SCREEN -->
<!-- ===================== -->
<div id="home" class="screen active">

  <h1>🎮 WHOT GAME</h1>
  <p>Stake • Play • Win</p>

  <button class="loginBtn" onclick="show('login')">LOGIN</button>
  <button class="registerBtn" onclick="alert('Add register screen later')">REGISTER</button>

</div>

<!-- ===================== -->
<!-- LOGIN SCREEN -->
<!-- ===================== -->
<div id="login" class="screen">

  <h1>LOGIN</h1>

  <input id="email" placeholder="Email" />
  <input id="password" placeholder="Password" type="password" />

  <button class="loginBtn" onclick="login()">LOGIN</button>

  <button class="link" onclick="show('home')">⬅ Back</button>

</div>

<!-- ===================== -->
<!-- SCRIPT -->
<!-- ===================== -->
<script>
function show(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screen).classList.add('active');
}

function login() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  if (!email || !pass) {
    alert("Fill all fields");
    return;
  }

  alert("Login success (connect Appwrite later)");

  // redirect to game later
  // window.location.href = "dashboard.html";
}
</script>

</body>
</html>
